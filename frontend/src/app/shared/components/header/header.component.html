<mat-toolbar color="primary" class="header">
  <a routerLink="/" class="logo">Breath for All</a>

  <span class="spacer"></span>

  <nav class="nav-links">
    <a mat-button routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      <mat-icon>home</mat-icon>
      <span class="nav-label">Accueil</span>
    </a>
    <a mat-button routerLink="/forum" routerLinkActive="active">
      <mat-icon>forum</mat-icon>
      <span class="nav-label">Forum</span>
    </a>
    <a mat-button routerLink="/recherche" routerLinkActive="active">
      <mat-icon>search</mat-icon>
      <span class="nav-label">Recherche</span>
    </a>

    <ng-container *ngIf="(authService.isLoggedIn$ | async); else notLoggedIn">
      <a mat-button routerLink="/profil" routerLinkActive="active">
        <mat-icon>person</mat-icon>
        <span class="nav-label">Mon profil</span>
      </a>
      <a mat-button routerLink="/admin/utilisateurs" routerLinkActive="active" *ngIf="isAdmin">
        <mat-icon>admin_panel_settings</mat-icon>
        <span class="nav-label">Admin</span>
      </a>
      <button mat-button (click)="onLogout()">
        <mat-icon>logout</mat-icon>
        <span class="nav-label">Déconnexion</span>
      </button>
    </ng-container>

    <ng-template #notLoggedIn>
      <a mat-button routerLink="/connexion" routerLinkActive="active">
        <mat-icon>login</mat-icon>
        <span class="nav-label">Connexion</span>
      </a>
    </ng-template>
  </nav>
</mat-toolbar>
